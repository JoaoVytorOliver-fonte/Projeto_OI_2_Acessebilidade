<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcessiMap | Pesquisa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="style_pagina_pesquisas.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="brand" aria-label="Voltar para a página inicial">
          <span class="brand-symbol">A</span>
          <div class="brand-copy">
            <strong>AcessiMap</strong>
            <span>Pesquisa</span>
          </div>
        </a>

        <nav class="desktop-nav" aria-label="Navegação principal">
          <a href="index.html">Início</a>
          <a href="#">Pesquisar</a>
          <a href="#">Avaliações</a>
          <a href="#">Contato</a>
        </nav>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Abrir menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <main class="search-page">
      <section class="search-layout">
        <aside class="search-sidebar" aria-label="Painel de pesquisa">
          <div class="search-hero">
            <span class="mini-label">Pesquisa</span>
            <h1>Encontre locais acessíveis</h1>
          </div>

          <form class="search-form" aria-label="Campo de pesquisa" onsubmit="return false;">
            <label for="searchInput" class="visually-hidden">Buscar local</label>

            <div class="search-input-wrapper">
              <svg
                class="search-icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
                fill="none"
              >
                <path
                  d="M21 21L16.65 16.65M10.8 18.6A7.8 7.8 0 1 0 10.8 3a7.8 7.8 0 0 0 0 15.6Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>

              <input
                type="search"
                id="searchInput"
                placeholder="Buscar local, bairro ou categoria"
                autocomplete="off"
              />

            </div>
          </form>

          <div class="filter-row" aria-label="Filtros visuais">
            <button type="button" class="filter-chip is-active">Todos</button>
            <button type="button" class="filter-chip">Rampa</button>
            <button type="button" class="filter-chip">Banheiro</button>
            <button type="button" class="filter-chip">Elevador</button>
          </div>

          <div class="result-list">
            <article class="result-card is-active" tabindex="0">
              <div class="result-card-top">
                <div>
                  <h2>Café Jardim</h2>
                  <p>Centro</p>
                </div>
                <span class="rate-pill">4.8</span>
              </div>
            </article>

            <article class="result-card" tabindex="0">
              <div class="result-card-top">
                <div>
                  <h2>Mercado Vida</h2>
                  <p>Bela Vista</p>
                </div>
                <span class="rate-pill">4.6</span>
              </div>
            </article>

            <article class="result-card" tabindex="0">
              <div class="result-card-top">
                <div>
                  <h2>Clínica Movimento</h2>
                  <p>Paraíso</p>
                </div>
                <span class="rate-pill">4.9</span>
              </div>
            </article>
          </div>
        </aside>

        <section class="map-panel" aria-label="Mapa de pesquisa">
          <div class="map-topbar">
            <div class="map-topbar-copy">
              <span class="mini-label">Mapa</span>
              <h2>Visualização principal</h2>
            </div>
          </div>

          <div class="map-frame">
            <div id="map" class="map-canvas"></div>

            <div class="floating-place-card">
              <span class="mini-label">Selecionado</span>
              <strong>Café Jardim</strong>
              <p>Ambiente com boa circulação e acesso facilitado.</p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
