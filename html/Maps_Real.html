<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"> <!-- "ISO-8859-1"-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pizzaria</title>
        <link rel="stylesheet" type="text/css" href="style.css">
            <!-- Leaflet CSS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    </head>
    <body>
  
        <!--Conteudo-->
        <section class="conteiner-mapa">
            <div class="barra-lateral">
                <form id="form-busca">
                    <input type="search" id="pesquisa" placeholder="Pesquisar local...">
                </form>

                <div id="resultados"></div>
            </div>
            <div id="map"></div>
        </section>

                    <div id="modal" class="modal">
                <div class="modal-conteudo">
                    <span id="fecharModal" class="fechar">&times;</span>
                    <h2 id="modalTitulo">a</h2>
                    <p id="modalEndereco"></p>

                    <form id="formAvaliacao">
                        <div class="avaliacao">
                            <input type="radio" name="estrela" id="estrela5" value="5">
                            <label for="estrela5">★</label>

                            <input type="radio" name="estrela" id="estrela4" value="4">
                            <label for="estrela4">★</label>

                            <input type="radio" name="estrela" id="estrela3" value="3">
                            <label for="estrela3">★</label>

                            <input type="radio" name="estrela" id="estrela2" value="2">
                            <label for="estrela2">★</label>

                            <input type="radio" name="estrela" id="estrela1" value="1">
                            <label for="estrela1">★</label>
                        </div>
                                                <div class="checkbox_formulario">
                            <label>
                                <input type="checkbox" name="acessibilidade" value="banheiro">
                                Banheiro acessível
                            </label>

                            <label>
                                <input type="checkbox" name="acessibilidade" value="rampa">
                                Rampa cadeirante
                            </label>

                            <label>
                                <input type="checkbox" name="acessibilidade" value="geral">
                                Acessibilidade geral
                            </label>
                        </div>
                        <textarea placeholder="Escreva sua avaliação..." required></textarea>
                        <button type="submit">Enviar</button>
                    </form>

                </div>
            </div>
        <!--Rodape-->
        <footer></footer>
        <!-- Leaflet JS -->
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <!-- Seu JS -->
        <script src="mapa.js"></script>
    </body>
</html>
